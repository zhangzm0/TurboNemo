<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TurboNemo</title>
    <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
        }
        #fps {
            position: fixed;
            top: 10px; left: 10px;
            color: #0f0;
            font: bold 14px monospace;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 4px;
            z-index: 10;
            pointer-events: none;
        }
        #timer {
            position: fixed;
            top: 10px; right: 10px;
            color: #fff;
            font: bold 14px monospace;
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 4px;
            z-index: 10;
            pointer-events: none;
        }
        #startOverlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.55);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            cursor: pointer;
            transition: opacity 0.4s;
        }
        #startOverlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #startBtn {
            width: 140px; height: 140px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.85);
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(4px);
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: background 0.2s, transform 0.2s;
            user-select: none;
        }
        #startBtn:hover {
            background: rgba(255,255,255,0.22);
            transform: scale(1.05);
        }
        #startBtn:active {
            transform: scale(0.95);
        }
        #startBtn .icon {
            font-size: 36px;
            line-height: 1;
        }
        #startBtn .label {
            font-size: 16px;
            letter-spacing: 2px;
        }
        #info {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: #ccc;
            font: 12px sans-serif;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 4px;
            z-index: 10;
            pointer-events: none;
        }
        #loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font: 14px sans-serif;
            text-align: center;
            z-index: 100;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        #loading .spinner {
            width: 40px; height: 40px;
            margin: 0 auto 12px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        #loading .title { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
        #loading .detail { font-size: 12px; color: #aaa; margin-top: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        canvas {
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            touch-action: none;
            -webkit-touch-callout: none;
        }
    </style>
</head>
<body>
    <div id="fps">FPS: --</div>
    <div id="timer">0.00s</div>
    <div id="info"></div>
    <div id="startOverlay" class="hidden">
        <div id="startBtn">
            <div class="icon">▶</div>
            <div class="label">开始</div>
        </div>
    </div>
    <div id="loading">
        <div class="spinner"></div>
        <div class="title">TurboNemo</div>
        <div class="detail" id="loadingDetail">正在连接...</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
</body>
</html>
