<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Compile Dump</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1e1e2e; color: #cdd6f4; font: 14px/1.5 monospace; padding: 20px; }
h1 { color: #cba6f7; margin-bottom: 8px; }
h2 { color: #89b4fa; margin: 24px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #45475a; font-size: 15px; }
h2:first-of-type { margin-top: 0; }
pre { background: #181825; border: 1px solid #313244; border-radius: 6px; padding: 14px; overflow-x: auto; font-size: 12px; line-height: 1.6; }
pre.lang-js { color: #a6e3a1; }
pre.lang-json { color: #fab387; }
#controls { margin-bottom: 20px; }
#controls button, #controls input { background: #45475a; color: #cdd6f4; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
#controls input { width: 300px; margin-right: 8px; }
#loading { color: #6c7086; font-style: italic; }
</style>
</head>
<body>
<h1>🧪 Compile Dump</h1>
<div id="controls">
    <input type="text" id="bcmUrl" value="" placeholder="BCM URL eg. https://creation.codemao.cn/490/...bcm" style="width:400px">
    <button onclick="load()">加载并编译</button>
</div>
<div id="loading">添加 ?url=&lt;BCM_URL&gt; 参数加载</div>
<div id="output"></div>
<script>
window.load = function() {
    const url = document.getElementById('bcmUrl').value;
    window.location.search = `?url=${encodeURIComponent(url)}`;
};
</script>
<script src="compile-dump.js"></script>
</body>
</html>
